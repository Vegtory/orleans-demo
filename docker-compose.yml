# Run the app backed by Azure Storage *locally*, using the Azurite emulator.
#
#   docker compose up --build
#   open http://localhost:8080
#
# This exercises the same code path as a real Azure Storage account: Orleans
# uses Azure Table clustering + Azure Table grain persistence, so counter state
# survives restarts. For real Azure, drop Azurite and point
# ORLEANS_AZURE_STORAGE_CONNECTION_STRING at your storage account instead.
services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000" # blob
      - "10001:10001" # queue
      - "10002:10002" # table
    volumes:
      - azurite-data:/data

  app:
    build: .
    ports:
      - "8080:8080" # only HTTP ingress is exposed; Orleans ports stay internal
    depends_on:
      - azurite
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ORLEANS_CLUSTERING: AzureStorage
      # Well-known Azurite development account, with endpoints pointed at the
      # "azurite" service. This is the emulator's public test key, not a secret.
      ORLEANS_AZURE_STORAGE_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;TableEndpoint=http://azurite:10002/devstoreaccount1;

volumes:
  azurite-data:
